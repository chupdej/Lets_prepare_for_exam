on Board Report?", "a": "Every sector", "b": "Before landing in BKK and at crew change station", "c": "After landing in BKK and at crew change station", "d": "Before landing in BKK only", "correct": "B"}, {"n": 66, "q": "What is the non-strict vegetarian meal that is prepared with dairy products and does not contain any type of fish or meat? (SI/ October 2025)", "a": "Vegetarian Lacto-Ovo Meal", "b": "Vegetarian Jain Meal", "c": "Vegetarian Vegan Meal", "d": "Asian Vegetarian Meal", "correct": "A"}, {"n": 67, "q": "What is the recommended serving temperature for white wine?", "a": "7-10 degree celcius", "b": "10-13 degree celcius", "c": "13-15 degree celcius", "d": "16-18 degree celcius", "correct": "A"}, {"n": 68, "q": "Which ingredient is added as a garnish to NEGRONI SBAGLIATO? (Cocktail Codex by AB/ 29SEP25)", "a": "Lemon Slice", "b": "Pansy Flower", "c": "Orange Slice", "d": "No Garniture Added", "correct": "C"}, {"n": 69, "q": "Which types of alcoholic beverages are produced through the distillation process?", "a": "Beer and Wine", "b": "Cognac and Whisky", "c": "Beer and Whisky", "d": "Wine and Cognac", "correct": "B"}, {"n": 70, "q": "Which one is NOT an ingredient of Kalimotxo? (Cocktail Codex by AB/ 29SEP25)", "a": "Port Wine", "b": "Coca Cola", "c": "Italian Red Wine", "d": "Orange Slice", "correct": "A"}, {"n": 71, "q": "What is Ragda Patties? (MLP)", "a": "Mushroom with green pea", "b": "Mustard seed and curry", "c": "Potato and pea", "d": "Red bean with onion", "correct": "C"}, {"n": 72, "q": "Which Barista menu is currently available on board?", "a": "Cold brew coffee", "b": "Espresso with orange juice", "c": "Thai iced tea with grass jelly", "d": "Coffee latte with coffee jelly", "correct": "C"}, {"n": 73, "q": "What is Kachumber Salad?", "a": "Green capsicum, green pea, paneer and carrot cooked with masala sauce", "b": "Indian Basmati rice with cumin seed", "c": "Potato with chopped spring onion", "d": "Capsicum and cucumber with chaat masala", "correct": "D"}, {"n": 74, "q": "Which syrup is used in making RRV? (Cocktail Codex by AB/ 29SEP25)", "a": "Lemongrass", "b": "Rose", "c": "Lychee", "d": "Pansy", "correct": "B"}, {"n": 75, "q": "Which item is made from buckwheat flour?", "a": "Udon", "b": "Soba", "c": "Vermicelli", "d": "Ramen", "correct": "B"}, {"n": 76, "q": "Which cocktail is NOT served in Thai Airways economy class? (Cocktail Codex by AB/ 29SEP25)", "a": "Whiskey Highball", "b": "Kalimotxo", "c": "Gin and Tonic", "d": "Legacy Reborn", "correct": "D"}, {"n": 77, "q": "Which type of meat is permissible in Hindu cuisine?", "a": "Lamb, Goat, Chicken and Fish", "b": "Beef, Prawn, Lamb and Chicken", "c": "Mutton, Lamb, Chicken and Beef", "d": "Fish, Goat, Beef and Lamb", "correct": "A"}, {"n": 78, "q": "Which of the following fish is a type of freshwater fish?", "a": "Mackerel", "b": "Grouper", "c": "Sole", "d": "Trout", "correct": "D"}, {"n": 79, "q": "Which sauce is made from bechamel enriched with grated cheese, egg yolk, mustard and cream?", "a": "Cardinal", "b": "Mornay", "c": "Soubise", "d": "Remoulade", "correct": "B"}, {"n": 80, "q": "What kind of coffee is made by pouring steamed milk into freshly brewed espresso until the cup is about three-quarters full, then topping it up with frothed milk?", "a": "Espresso", "b": "Cappuccino", "c": "Latte", "d": "Macchiato", "correct": "C"}, {"n": 81, "q": "Which type of tea is made from fresh leaves that are dried immediately after picking, thus stopping oxidation and inactivating enzymes, resulting in a light greenish-yellow color?", "a": "Earl grey", "b": "English Breakfast tea", "c": "Camomile", "d": "Japanese Green tea", "correct": "D"}, {"n": 82, "q": "What kind of coffee is made from espresso, steamed milk and milk foam in equal parts?", "a": "Espresso", "b": "Macchiato", "c": "Cappuccino", "d": "Cafe au lait", "correct": "C"}];
const IS_HARD = false;

let order = [];
let cur = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  cur = 0;
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('totalQ').textContent = QUESTIONS.length;
  renderQuestion();
}

function updateStats() {
  document.getElementById('curNum').textContent = cur + 1;
  document.getElementById('correctNum').textContent = correctCount;
  document.getElementById('wrongNum').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('progFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderQuestion() {
  if (cur >= QUESTIONS.length) { renderEnd(); return; }
  answered = false;
  const q = QUESTIONS[order[cur]];
  updateStats();
  const subjTag = (IS_HARD && q.subject) ? `<span class="subj-tag">${escapeHtml(q.subject.split('_')[0])}</span>` : '';
  const qNumCls = IS_HARD ? 'qnum hard' : 'qnum';
  const html = `
    <div class="question-card">
      <div>
        <span class="${qNumCls}">ข้อ ${cur + 1} / ${QUESTIONS.length}</span>
        ${subjTag}
      </div>
      <div class="question" style="margin-top: 12px;">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${['A','B','C','D'].map(letter => `
          <button class="choice" data-letter="${letter}" onclick="selectAnswer('${letter}')">
            <span class="letter">${letter}</span>
            <span>${escapeHtml(q[letter.toLowerCase()])}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>ข้อถัดไป →</button>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มใหม่ (สุ่มใหม่)</button>
      </div>
    </div>`;
  document.getElementById('main').innerHTML = html;
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[order[cur]];
  const isCorrect = letter === q.correct;
  if (isCorrect) correctCount++; else wrongCount++;
  
  // Disable all choices, mark correct one green
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    const l = btn.dataset.letter;
    if (l === q.correct) btn.classList.add('correct');
    else if (l === letter) btn.classList.add('wrong');
  });
  
  // Feedback box
  const fb = document.getElementById('feedback');
  const correctText = q[q.correct.toLowerCase()];
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ ถูกต้อง!</strong><div class="ans">คำตอบ: ${q.correct}. ${escapeHtml(correctText)}</div>`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ ผิด</strong><div class="ans">คำตอบที่ถูกคือ: ${q.correct}. ${escapeHtml(correctText)}</div>`;
  }
  document.getElementById('nextBtn').disabled = false;
  updateStats();
}

function nextQuestion() {
  cur++;
  renderQuestion();
}

function restartQuiz() {
  if (confirm('เริ่มใหม่และสุ่มลำดับข้อใหม่?')) startQuiz();
}

function renderEnd() {
  updateStats();
  document.getElementById('progFill').style.width = '100%';
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);
  let msg, emoji;
  if (pct >= 90) { msg = 'ยอดเยี่ยม! พร้อมสอบจริงแล้ว'; emoji = '🏆'; }
  else if (pct >= 75) { msg = 'ดีมาก! เกือบพร้อมแล้ว'; emoji = '🎉'; }
  else if (pct >= 60) { msg = 'ผ่านเกณฑ์ ฝึกเพิ่มอีกนิด'; emoji = '👍'; }
  else if (pct >= 40) { msg = 'ยังต้องอ่านเพิ่ม สู้ๆ'; emoji = '📖'; }
  else { msg = 'อ่านเนื้อหาใหม่ก่อนนะครับ'; emoji = '💪'; }
  document.getElementById('main').innerHTML = `
    <div class="end-screen">
      <div style="font-size: 4rem;">${emoji}</div>
      <h2>เสร็จสิ้น</h2>
      <div class="end-score">${correctCount} / ${total}</div>
      <div style="font-size: 1.5rem; color: #5b2a8a; margin-bottom: 8px;">${pct}%</div>
      <div class="end-message">${msg}</div>
      <div class="controls">
        <button class="btn btn-primary" onclick="restartQuiz()">ทำใหม่ (สุ่มข้อใหม่)</button>
      </div>
    </div>`;
}

startQuiz();
</script>
