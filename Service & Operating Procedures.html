<title>SCC Quiz — QBA Service & Operating Procedures</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #6e3b89 0%, #4a1f73 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  header {
    background: linear-gradient(135deg, #5b2a8a 0%, #3d1761 100%);

    padding: 24px 28px;
  }
  header h1 { font-size: 1.5rem; margin-bottom: 6px; }
  header .sub { opacity: 0.85; font-size: 0.95rem; }
  .stats {
    display: flex;
    gap: 16px;
    padding: 16px 28px;
    background: #faf7fc;
    border-bottom: 1px solid #e9e2ef;
    flex-wrap: wrap;
  }
  .stat {
    flex: 1;
    min-width: 100px;
    text-align: center;
  }
  .stat .num {
    font-size: 1.6rem;
    font-weight: 700;
    color: #5b2a8a;
  }
  .stat .num.correct { color: #2e7d32; }
  .stat .num.wrong { color: #c62828; }
  .stat .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #666;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .progress-wrap {
    padding: 0 28px 16px;
    background: #faf7fc;
  }
  .progress-bar {
    height: 8px;
    background: #e9e2ef;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #5b2a8a, #c294e3);
    width: 0%;
    transition: width 0.4s ease;
  }
  main { padding: 28px; }
  .question-card {
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }

  }
  .qnum {
    display: inline-block;
    background: #5b2a8a;
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 12px;
  }

    font-weight: 600;
    margin-left: 6px;

    color: #1a1a1a;
  }

  }
  .choice {

    gap: 12px;
    padding: 14px 16px;

    width: 100%;
    font-family: inherit;
    font-size: 0.98rem;
    line-height: 1.5;
    color: #1a1a1a;
  }
  .choice:hover:not(:disabled) {
    border-color: #5b2a8a;
    background: #faf7fc;
    transform: translateX(2px);
  }
  .choice:disabled { cursor: default; }
  .choice .letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e9e2ef;
    color: #5b2a8a;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .choice.correct {
    border-color: #2e7d32;
    background: #e8f5e9;
  }
  .choice.correct .letter {
    background: #2e7d32;
    color: white;
  }
  .choice.wrong {
    border-color: #c62828;
    background: #ffebee;
  }
  .choice.wrong .letter {
    background: #c62828;
    color: white;
  }
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.show { display: block; }
  .feedback.correct {
    background: #e8f5e9;
    border-left: 4px solid #2e7d32;
    color: #1b5e20;
  }
  .feedback.wrong {
    background: #ffebee;
    border-left: 4px solid #c62828;
    color: #b71c1c;
  }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
  .feedback .ans { font-size: 0.95rem; line-height: 1.5; }
  .controls {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button.btn {
    padding: 12px 22px;

    font-weight: 600;

    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: #5b2a8a;

  }
  .btn-primary:hover { background: #3d1761; transform: translateY(-1px); }
  .btn-primary:disabled { background: #b8a4cc; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #f0e6f6;
    color: #5b2a8a;
  }
  .btn-secondary:hover { background: #e0d0ee; }
  .end-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .end-screen h2 { color: #5b2a8a; font-size: 1.8rem; margin-bottom: 12px; }
  .end-score {

    font-weight: 700;
    color: #5b2a8a;
    margin: 20px 0;
  }
  .end-message {
    font-size: 1.1rem;
    color: #666;
    margin-bottom: 24px;
  }

  footer {

    border-top: 1px solid #e9e2ef;
  }
  @media (max-width: 600px) {

    .stats { padding: 12px 20px; gap: 8px; }
    .stat .num { font-size: 1.3rem; }
  }
</style>

const IS_HARD = false;

let order = [];
let cur = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  cur = 0;
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('totalQ').textContent = QUESTIONS.length;
  renderQuestion();
}

function updateStats() {
  document.getElementById('curNum').textContent = cur + 1;
  document.getElementById('correctNum').textContent = correctCount;
  document.getElementById('wrongNum').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('progFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderQuestion() {
  if (cur >= QUESTIONS.length) { renderEnd(); return; }
  answered = false;
  const q = QUESTIONS[order[cur]];
  updateStats();
  const subjTag = (IS_HARD && q.subject) ? `<span class="subj-tag">${escapeHtml(q.subject.split('_')[0])}</span>` : '';
  const qNumCls = IS_HARD ? 'qnum hard' : 'qnum';
  const html = `
    <div class="question-card">
      <div>
        <span class="${qNumCls}">ข้อ ${cur + 1} / ${QUESTIONS.length}</span>
        ${subjTag}
      </div>
      <div class="question" style="margin-top: 12px;">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${['A','B','C','D'].map(letter => `
          <button class="choice" data-letter="${letter}" onclick="selectAnswer('${letter}')">
            <span class="letter">${letter}</span>
            <span>${escapeHtml(q[letter.toLowerCase()])}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>ข้อถัดไป →</button>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มใหม่ (สุ่มใหม่)</button>
      </div>
    </div>`;
  document.getElementById('main').innerHTML = html;
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[order[cur]];
  const isCorrect = letter === q.correct;
  if (isCorrect) correctCount++; else wrongCount++;
  
  // Disable all choices, mark correct one green
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    const l = btn.dataset.letter;
    if (l === q.correct) btn.classList.add('correct');
    else if (l === letter) btn.classList.add('wrong');
  });
  
  // Feedback box
  const fb = document.getElementById('feedback');
  const correctText = q[q.correct.toLowerCase()];
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ ถูกต้อง!</strong><div class="ans">คำตอบ: ${q.correct}. ${escapeHtml(correctText)}</div>`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ ผิด</strong><div class="ans">คำตอบที่ถูกคือ: ${q.correct}. ${escapeHtml(correctText)}</div>`;
  }
  document.getElementById('nextBtn').disabled = false;
  updateStats();
}

function nextQuestion() {
  cur++;
  renderQuestion();
}

function restartQuiz() {
  if (confirm('เริ่มใหม่และสุ่มลำดับข้อใหม่?')) startQuiz();
}

function renderEnd() {
  updateStats();
  document.getElementById('progFill').style.width = '100%';
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);
  let msg, emoji;
  if (pct >= 90) { msg = 'ยอดเยี่ยม! พร้อมสอบจริงแล้ว'; emoji = '🏆'; }
  else if (pct >= 75) { msg = 'ดีมาก! เกือบพร้อมแล้ว'; emoji = '🎉'; }
  else if (pct >= 60) { msg = 'ผ่านเกณฑ์ ฝึกเพิ่มอีกนิด'; emoji = '👍'; }
  else if (pct >= 40) { msg = 'ยังต้องอ่านเพิ่ม สู้ๆ'; emoji = '📖'; }
  else { msg = 'อ่านเนื้อหาใหม่ก่อนนะครับ'; emoji = '💪'; }
  document.getElementById('main').innerHTML = `
    <div class="end-screen">
      <div style="font-size: 4rem;">${emoji}</div>
      <h2>เสร็จสิ้น</h2>
      <div class="end-score">${correctCount} / ${total}</div>
      <div style="font-size: 1.5rem; color: #5b2a8a; margin-bottom: 8px;">${pct}%</div>
      <div class="end-message">${msg}</div>
      <div class="controls">
        <button class="btn btn-primary" onclick="restartQuiz()">ทำใหม่ (สุ่มข้อใหม่)</button>
      </div>
    </div>`;
}

startQuiz();
</script>
</body>
</html>
